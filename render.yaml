services:
  # ──────────────────────────────────────────────────────────────
  # Backend — Node.js API (Express + LangGraph.js)
  # Frontend is hosted separately on Vercel (free tier)
  # ──────────────────────────────────────────────────────────────
  - type: web
    name: findoc-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8000"
      # Set these in the Render dashboard — do NOT commit real values here
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_GROUNDING_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: OPENAI_EMBEDDING_DIMENSIONS
        value: "1536"
      # Include both localhost (dev) and the Vercel production URL
      - key: ALLOWED_ORIGINS
        value: "http://localhost:5173,https://fin-doc-rag-sec-filing-assistant.vercel.app"
